services:
  spring-base-event:
    networks:
      - spring-base-event-network
    image: 'spring-base-event:1.0.0'
    container_name: spring-base-event
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "9088:9088"
    environment:
      - SERVER_PORT=9088
      - POSTGRES_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  postgres:
    networks:
      - spring-base-event-network
    image: postgres:18.3-alpine3.23
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=myspringeventdatabase
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 10s
      retries: 5
  rabbitmq:
    networks:
      - spring-base-event-network
    image: 'rabbitmq:4.2.4-alpine'
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=123456
    volumes:
      - rabbitmq-volume:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
volumes:
  postgres-volume:
    name: postgres-volume
  rabbitmq-volume:
    name: rabbitmq-volume
networks:
  spring-base-event-network:
    driver: bridge